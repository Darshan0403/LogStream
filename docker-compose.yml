version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: logstream
      POSTGRES_PASSWORD: password
      POSTGRES_DB: logstream
    ports:
      - "5433:5432"  # FIX: Bound to host port 5433 to avoid collision with AI assistant
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logstream"]
      interval: 5s
      timeout: 5s
      retries: 5

  logstream-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8090"  # Facing host port 8090
    environment:
      DATABASE_URL: postgres://logstream:password@postgres:5432/logstream?sslmode=disable
      API_KEY: dev-key
      WAL_PATH: /data/wal.log
      # --- DEPLOYMENT SWITCH ---
      # Set to "false" before deploying publicly to disable log ingestion.
      # The search/browse UI will still work, ingestion returns 403.
      INGEST_ENABLED: "true"
    volumes:
      - data_wal:/data
    depends_on:
      postgres:
        condition: service_healthy
    command: [ "serve", "--port=8090"]

  logstream-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"  # FIX: Bound to host port 5173 per design spec
    depends_on:
      - logstream-api

volumes:
  pgdata:
  data_wal: