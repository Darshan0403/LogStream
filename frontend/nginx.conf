server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    
    # 1. SPA fallback — route all normal frontend navigation to React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy REST API calls to the Go container
    location /api/ {
        proxy_pass http://logstream-api:8090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Proxy the WebSocket Live Tail connection
    location /ws {
        proxy_pass http://logstream-api:8090/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}